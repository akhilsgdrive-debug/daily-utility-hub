    <script src="js/main.js"></script>
    <script>
        const tools = [
            {id: 'calculator', name: 'Calculator', icon: '🧮', desc: 'Fast basic arithmetic calculator', category: 'Math'},
            {id: 'notes', name: 'Notes App', icon: '📝', desc: 'Quick notes that save automatically', category: 'Productivity'},
            {id: 'todo', name: 'To-Do List', icon: '✅', desc: 'Simple task manager with persistence', category: 'Productivity'},
            {id: 'countdown', name: 'Countdown Timer', icon: '⏳', desc: 'Set a timer and get notified', category: 'Time'},
            {id: 'stopwatch', name: 'Stopwatch', icon: '⏱️', desc: 'Precise timer with lap support', category: 'Time'},
            {id: 'converter', name: 'Unit Converter', icon: '🔄', desc: 'Convert length, weight & temperature', category: 'Math'},
            {id: 'bmi', name: 'BMI Calculator', icon: '📏', desc: 'Calculate Body Mass Index', category: 'Health'},
            {id: 'age', name: 'Age Calculator', icon: '🎂', desc: 'Calculate exact age from birth date', category: 'Utility'},
            {id: 'password', name: 'Password Generator', icon: '🔐', desc: 'Create strong secure passwords', category: 'Security'},
            {id: 'text', name: 'Text Utilities', icon: '✍️', desc: 'Count, convert case & clean text', category: 'Text'}
        ];
        function renderToolCards(filteredTools = tools) {
            const grid = document.getElementById('tools-grid');
            grid.innerHTML = '';
            filteredTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = `tool-card group cursor-pointer`;
                card.innerHTML = `<div class="flex-1"><div class="icon text-4xl mb-5">${tool.icon}</div><h3 class="font-semibold text-2xl tracking-tight mb-1.5 group-hover:text-indigo-600 transition-colors">${tool.name}</h3><p class="text-sm text-zinc-600 dark:text-zinc-400 line-clamp-2">${tool.desc}</p></div><div class="mt-6 flex items-center justify-between text-xs"><span class="px-3 py-1 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-500">${tool.category}</span><span class="font-medium text-indigo-600 dark:text-indigo-400 flex items-center gap-1 text-sm group-hover:gap-2 transition-all">Open <span class="text-lg leading-none">→</span></span></div>`;
                card.onclick = () => openToolModal(tool.id);
                grid.appendChild(card);
            });
        }
        function initToolSearch() {
            const searchInput = document.getElementById('tool-search');
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase().trim();
                const filtered = tools.filter(t => t.name.toLowerCase().includes(term) || t.desc.toLowerCase().includes(term) || t.category.toLowerCase().includes(term));
                renderToolCards(filtered);
            });
        }
        let currentTool = null;
        function openToolModal(toolId) {
            const modal = document.getElementById('tool-modal');
            const header = document.getElementById('modal-header');
            const body = document.getElementById('modal-body');
            const tool = tools.find(t => t.id === toolId);
            if (!tool) return;
            currentTool = toolId;
            header.innerHTML = `<div class="flex items-center gap-4"><div class="text-4xl">${tool.icon}</div><div><div class="font-semibold text-2xl tracking-tight">${tool.name}</div><div class="text-xs text-zinc-500">${tool.desc}</div></div></div>`;
            body.innerHTML = getToolHTML(toolId);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { initToolJS(toolId); }, 50);
        }
        function closeModal() {
            const modal = document.getElementById('tool-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
        function getToolHTML(toolId) {
            switch(toolId) {
                case 'calculator': return `<div class="max-w-md mx-auto"><div class="bg-zinc-900 dark:bg-black text-white p-6 rounded-3xl mb-4"><div id="calc-display" class="calculator-display text-right text-5xl font-light tracking-tighter h-20 flex items-center justify-end pr-1 overflow-hidden">0</div></div><div class="grid grid-cols-4 gap-3"><button onclick="calcClear()" class="calc-btn bg-red-100 dark:bg-red-950 text-red-600 dark:text-red-400 font-medium">C</button><button onclick="calcInput('(')" class="calc-btn number">(</button><button onclick="calcInput(')')" class="calc-btn number">)</button><button onclick="calcInput('/')" class="calc-btn operator">÷</button><button onclick="calcInput('7')" class="calc-btn number">7</button><button onclick="calcInput('8')" class="calc-btn number">8</button><button onclick="calcInput('9')" class="calc-btn number">9</button><button onclick="calcInput('*')" class="calc-btn operator">×</button><button onclick="calcInput('4')" class="calc-btn number">4</button><button onclick="calcInput('5')" class="calc-btn number">5</button><button onclick="calcInput('6')" class="calc-btn number">6</button><button onclick="calcInput('-')" class="calc-btn operator">−</button><button onclick="calcInput('1')" class="calc-btn number">1</button><button onclick="calcInput('2')" class="calc-btn number">2</button><button onclick="calcInput('3')" class="calc-btn number">3</button><button onclick="calcInput('+')" class="calc-btn operator">+</button><button onclick="calcInput('0')" class="calc-btn number col-span-2">0</button><button onclick="calcInput('.')" class="calc-btn number">.</button><button onclick="calcEquals()" class="calc-btn equals">=</button></div><p class="text-[10px] text-center text-zinc-400 mt-4">Supports basic operations. Use keyboard too.</p></div>`;
                case 'notes': return `<div><div class="flex gap-3 mb-4"><input id="note-title" type="text" placeholder="Note title..." class="flex-1 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-sm"><button onclick="addNote()" class="px-6 rounded-2xl bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white text-sm font-semibold">Add Note</button></div><div id="notes-list" class="space-y-3 max-h-[420px] overflow-auto pr-1 custom-scroll"></div><div class="mt-4 text-xs text-zinc-500 flex justify-between items-center"><span>Notes are saved automatically in your browser.</span><button onclick="clearAllNotes()" class="text-red-500 hover:text-red-600 text-xs">Clear all</button></div></div>`;
                case 'todo': return `<div><div class="flex gap-3 mb-5"><input id="todo-input" type="text" placeholder="What needs to be done?" class="flex-1 px-4 py-3.5 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-sm" onkeypress="if(event.key === 'Enter') addTodo()"><button onclick="addTodo()" class="px-7 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm">Add</button></div><div id="todo-list" class="space-y-2 max-h-[380px] overflow-auto"></div><div class="flex justify-between items-center mt-5 text-xs"><div id="todo-stats" class="text-zinc-500"></div><button onclick="clearCompletedTodos()" class="text-red-500 hover:underline">Clear completed</button></div></div>`;
                case 'countdown': return `<div class="max-w-sm mx-auto text-center"><div id="countdown-display" class="timer-display font-mono tracking-[-3.5px] text-zinc-900 dark:text-white mb-8">05:00</div><div class="grid grid-cols-3 gap-4 mb-8"><div><label class="block text-xs text-zinc-500 mb-1.5">MINUTES</label><input id="cd-minutes" type="number" value="5" min="0" max="999" class="w-full text-center text-2xl font-semibold bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-2xl py-3"></div><div><label class="block text-xs text-zinc-500 mb-1.5">SECONDS</label><input id="cd-seconds" type="number" value="0" min="0" max="59" class="w-full text-center text-2xl font-semibold bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-2xl py-3"></div><div class="flex items-end"><button onclick="setCountdownTime()" class="w-full py-3.5 text-sm font-semibold rounded-2xl border border-zinc-300 dark:border-zinc-700">Set</button></div></div><div class="flex gap-3 justify-center"><button id="cd-start" onclick="startCountdown()" class="flex-1 py-3.5 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold">Start</button><button onclick="pauseCountdown()" class="flex-1 py-3.5 rounded-2xl bg-amber-500 hover:bg-amber-600 text-white font-semibold">Pause</button><button onclick="resetCountdown()" class="flex-1 py-3.5 rounded-2xl border border-zinc-300 dark:border-zinc-700 font-medium">Reset</button></div><p class="text-xs text-zinc-500 mt-6">Timer will alert you when finished.</p></div>`;
                case 'stopwatch': return `<div class="max-w-sm mx-auto text-center"><div id="stopwatch-display" class="timer-display font-mono tracking-[-4px] mb-8 text-zinc-900 dark:text-white">00:00.00</div><div class="flex gap-3 mb-6"><button id="sw-start" onclick="startStopwatch()" class="flex-1 py-3.5 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold">Start</button><button onclick="lapStopwatch()" class="flex-1 py-3.5 rounded-2xl border border-zinc-300 dark:border-zinc-700 font-medium">Lap</button><button onclick="resetStopwatch()" class="flex-1 py-3.5 rounded-2xl border border-zinc-300 dark:border-zinc-700 font-medium">Reset</button></div><div id="laps-list" class="max-h-48 overflow-auto text-left text-sm space-y-1"></div></div>`;
                case 'converter': return `<div class="max-w-md mx-auto"><div class="mb-5"><label class="text-xs font-medium text-zinc-500">CONVERSION TYPE</label><select id="conv-type" onchange="updateConverterUnits()" class="w-full mt-1.5 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950"><option value="length">Length</option><option value="weight">Weight</option><option value="temperature">Temperature</option></select></div><div class="grid grid-cols-5 gap-3 items-end"><div class="col-span-2"><label class="text-xs font-medium text-zinc-500">FROM</label><select id="conv-from" class="w-full mt-1 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-sm"></select></div><div class="col-span-1 flex justify-center pb-3"><button onclick="swapUnits()" class="w-9 h-9 flex items-center justify-center text-xl text-zinc-400 hover:text-indigo-600">⇄</button></div><div class="col-span-2"><label class="text-xs font-medium text-zinc-500">TO</label><select id="conv-to" class="w-full mt-1 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-sm"></select></div></div><div class="mt-5"><label class="text-xs font-medium text-zinc-500">VALUE</label><input id="conv-value" type="number" value="1" step="any" oninput="convertUnits()" class="w-full mt-1.5 px-4 py-4 text-3xl font-semibold rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950"></div><div class="mt-4 p-5 bg-zinc-100 dark:bg-zinc-950 rounded-3xl"><div class="text-xs text-zinc-500">RESULT</div><div id="conv-result" class="text-4xl font-semibold tracking-tight mt-1 text-indigo-600 dark:text-indigo-400">—</div></div></div>`;
                case 'bmi': return `<div class="max-w-sm mx-auto"><div class="grid grid-cols-2 gap-4"><div><label class="text-xs font-medium text-zinc-500">HEIGHT (cm)</label><input id="bmi-height" type="number" value="170" class="w-full mt-1 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-xl font-semibold" oninput="calculateBMI()"></div><div><label class="text-xs font-medium text-zinc-500">WEIGHT (kg)</label><input id="bmi-weight" type="number" value="65" class="w-full mt-1 px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-xl font-semibold" oninput="calculateBMI()"></div></div><button onclick="calculateBMI()" class="mt-5 w-full py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">Calculate BMI</button><div id="bmi-result" class="mt-6 hidden p-6 rounded-3xl bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 text-center"><div class="text-sm text-zinc-500">YOUR BMI</div><div id="bmi-value" class="text-6xl font-semibold tracking-tighter my-1 text-indigo-600"></div><div id="bmi-category" class="inline-block px-4 py-1 rounded-full text-sm font-medium"></div><div class="mt-4 text-xs text-left text-zinc-500"><div class="flex justify-between"><span>Underweight</span><span>&lt; 18.5</span></div><div class="flex justify-between"><span>Normal</span><span>18.5 – 24.9</span></div><div class="flex justify-between"><span>Overweight</span><span>25 – 29.9</span></div><div class="flex justify-between"><span>Obese</span><span>≥ 30</span></div></div></div></div>`;
                case 'age': return `<div class="max-w-sm mx-auto"><label class="block text-sm font-medium text-zinc-600 dark:text-zinc-400 mb-2">Your date of birth</label><input id="age-dob" type="date" class="w-full px-4 py-3.5 text-lg rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950" onchange="calculateAge()"><button onclick="calculateAge()" class="mt-4 w-full py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">Calculate Age</button><div id="age-result" class="mt-6 hidden"><div class="p-6 rounded-3xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white text-center"><div class="text-xs tracking-widest opacity-75">YOUR AGE</div><div id="age-years" class="text-7xl font-semibold tracking-[-3px] mt-1"></div><div id="age-details" class="text-sm opacity-90 mt-1"></div></div></div></div>`;
                case 'password': return `<div><div class="mb-5"><div class="flex justify-between text-xs mb-2 px-1"><span class="font-medium text-zinc-600 dark:text-zinc-400">PASSWORD LENGTH</span><span id="pw-length-value" class="font-mono font-semibold">16</span></div><input id="pw-length" type="range" min="6" max="32" value="16" step="1" oninput="updatePasswordLength()" class="w-full accent-indigo-600"></div><div class="grid grid-cols-2 gap-x-6 gap-y-3 text-sm mb-6"><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="pw-upper" checked class="accent-indigo-600"> Uppercase (A-Z)</label><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="pw-lower" checked class="accent-indigo-600"> Lowercase (a-z)</label><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="pw-numbers" checked class="accent-indigo-600"> Numbers (0-9)</label><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="pw-symbols" checked class="accent-indigo-600"> Symbols (!@#$)</label></div><button onclick="generatePassword()" class="w-full py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold mb-4">Generate Password</button><div class="relative"><input id="pw-output" readonly class="w-full font-mono text-lg tracking-widest bg-white dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-700 px-4 py-4 pr-12 rounded-2xl" placeholder="Your secure password will appear here"><button onclick="copyPassword()" class="copy-btn absolute right-4 top-4 text-xs px-3 py-1 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200">Copy</button></div><div class="mt-4"><div class="flex justify-between text-xs mb-1.5 px-1"><span>Strength</span><span id="pw-strength-text" class="font-medium"></span></div><div class="h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden"><div id="pw-strength-bar" class="strength-bar w-0 bg-emerald-500"></div></div></div></div>`;
                case 'text': return `<div><textarea id="text-input" rows="6" placeholder="Type or paste your text here..." class="w-full px-5 py-4 rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 resize-y text-[15px]" oninput="updateTextStats()"></textarea><div class="grid grid-cols-3 gap-3 my-4 text-center text-xs"><div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-3"><div id="text-chars" class="font-mono text-2xl font-semibold">0</div><div class="text-zinc-500">Characters</div></div><div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-3"><div id="text-words" class="font-mono text-2xl font-semibold">0</div><div class="text-zinc-500">Words</div></div><div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-3"><div id="text-sentences" class="font-mono text-2xl font-semibold">0</div><div class="text-zinc-500">Sentences</div></div></div><div class="flex flex-wrap gap-2"><button onclick="transformText('upper')" class="text-xs px-4 py-2 rounded-2xl border border-zinc-300 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800">UPPERCASE</button><button onclick="transformText('lower')" class="text-xs px-4 py-2 rounded-2xl border border-zinc-300 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800">lowercase</button><button onclick="transformText('capitalize')" class="text-xs px-4 py-2 rounded-2xl border border-zinc-300 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800">Capitalize</button><button onclick="transformText('remove-spaces')" class="text-xs px-4 py-2 rounded-2xl border border-zinc-300 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800">Remove Extra Spaces</button><button onclick="copyTextOutput()" class="copy-btn text-xs px-4 py-2 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700">Copy Text</button><button onclick="clearText()" class="text-xs px-4 py-2 rounded-2xl border border-zinc-300 dark:border-zinc-700">Clear</button></div></div>`;
                default: return `<p class="text-center py-8 text-zinc-500">Tool coming soon.</p>`;
            }
        }
        function initToolJS(toolId) {
            if (toolId === 'notes') loadNotes();
            else if (toolId === 'todo') loadTodos();
            else if (toolId === 'converter') { updateConverterUnits(); setTimeout(() => { const val = document.getElementById('conv-value'); if (val) val.dispatchEvent(new Event('input')); }, 100); }
            else if (toolId === 'password') updatePasswordLength();
            else if (toolId === 'text') updateTextStats();
            if (toolId === 'calculator') {
                const display = document.getElementById('calc-display');
                if (display) {
                    document.addEventListener('keydown', function calcKeyHandler(e) {
                        if (!document.getElementById('tool-modal').classList.contains('flex')) { document.removeEventListener('keydown', calcKeyHandler); return; }
                        if (e.key >= '0' && e.key <= '9' || e.key === '.') calcInput(e.key);
                        else if (e.key === '+') calcInput('+');
                        else if (e.key === '-') calcInput('-');
                        else if (e.key === '*') calcInput('*');
                        else if (e.key === '/') calcInput('/');
                        else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calcEquals(); }
                        else if (e.key.toLowerCase() === 'c') calcClear();
                        else if (e.key === 'Backspace') { let val = display.textContent; display.textContent = val.length > 1 ? val.slice(0, -1) : '0'; }
                    });
                }
            }
        }
        let calcExpression = '';
        function calcInput(val) { const display = document.getElementById('calc-display'); if (!display) return; if (display.textContent === '0' && val !== '.') display.textContent = val; else display.textContent += val; calcExpression = display.textContent; }
        function calcClear() { const display = document.getElementById('calc-display'); if (display) { display.textContent = '0'; calcExpression = ''; } }
        function calcEquals() { const display = document.getElementById('calc-display'); if (!display) return; try { let result = Function('"use strict"; return (' + display.textContent.replace(/×/g, '*').replace(/÷/g, '/') + ')')(); display.textContent = Number.isFinite(result) ? result : 'Error'; } catch { display.textContent = 'Error'; } }
        let notes = [];
        function loadNotes() { const saved = localStorage.getItem('duh_notes'); notes = saved ? JSON.parse(saved) : []; renderNotes(); }
        function saveNotes() { localStorage.setItem('duh_notes', JSON.stringify(notes)); }
        function renderNotes() { const container = document.getElementById('notes-list'); if (!container) return; container.innerHTML = ''; if (notes.length === 0) { container.innerHTML = `<p class="text-center text-sm py-8 text-zinc-400">No notes yet. Add your first note above.</p>`; return; } notes.slice().reverse().forEach((note, index) => { const actualIndex = notes.length - 1 - index; const el = document.createElement('div'); el.className = 'note-item group'; el.innerHTML = `<div class="flex justify-between items-start"><div class="flex-1 min-w-0 pr-3"><div class="font-semibold text-base">${note.title || 'Untitled'}</div><div class="text-sm text-zinc-600 dark:text-zinc-400 mt-1 line-clamp-3">${note.content}</div><div class="text-[10px] text-zinc-400 mt-2">${new Date(note.date).toLocaleDateString()}</div></div><div class="flex gap-1 opacity-70 group-hover:opacity-100"><button onclick="editNote(${actualIndex})" class="p-1.5 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-xl text-xs">Edit</button><button onclick="deleteNote(${actualIndex})" class="p-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-950 rounded-xl text-xs">Del</button></div></div>`; container.appendChild(el); }); }
        function addNote() { const titleInput = document.getElementById('note-title'); const content = prompt('Note content:') || ''; if (!content.trim()) return; notes.push({id: Date.now().toString(36) + Math.random().toString(36).substr(2), title: titleInput.value.trim() || 'Note', content: content.trim(), date: new Date().toISOString()}); saveNotes(); renderNotes(); titleInput.value = ''; }
        function editNote(index) { const note = notes[index]; const newTitle = prompt('Edit title:', note.title) || note.title; const newContent = prompt('Edit content:', note.content) || note.content; notes[index].title = newTitle.trim(); notes[index].content = newContent.trim(); saveNotes(); renderNotes(); }
        function deleteNote(index) { if (!confirm('Delete this note?')) return; notes.splice(index, 1); saveNotes(); renderNotes(); }
        function clearAllNotes() { if (!confirm('Delete ALL notes?')) return; notes = []; saveNotes(); renderNotes(); }
        let todos = [];
        function loadTodos() { const saved = localStorage.getItem('duh_todos'); todos = saved ? JSON.parse(saved) : []; renderTodos(); }
        function saveTodos() { localStorage.setItem('duh_todos', JSON.stringify(todos)); }
        function renderTodos() { const list = document.getElementById('todo-list'); const stats = document.getElementById('todo-stats'); if (!list || !stats) return; list.innerHTML = ''; if (todos.length === 0) { list.innerHTML = `<p class="text-center py-6 text-sm text-zinc-400">No tasks yet. Add one above!</p>`; stats.textContent = ''; return; } let completed = 0; todos.forEach((todo, idx) => { if (todo.completed) completed++; const item = document.createElement('div'); item.className = `todo-item flex items-center gap-3 px-4 py-3 ${todo.completed ? 'opacity-60' : ''}`; item.innerHTML = `<input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${idx})" class="w-5 h-5 accent-emerald-600"><div class="flex-1 text-sm ${todo.completed ? 'line-through text-zinc-400' : ''}">${todo.text}</div><button onclick="deleteTodo(${idx})" class="text-red-400 hover:text-red-600 px-2">×</button>`; list.appendChild(item); }); stats.textContent = `${completed}/${todos.length} completed`; }
        function addTodo() { const input = document.getElementById('todo-input'); if (!input || !input.value.trim()) return; todos.unshift({id: Date.now().toString(36) + Math.random().toString(36).substr(2), text: input.value.trim(), completed: false, created: new Date().toISOString()}); saveTodos(); renderTodos(); input.value = ''; }
        function toggleTodo(index) { todos[index].completed = !todos[index].completed; saveTodos(); renderTodos(); }
        function deleteTodo(index) { todos.splice(index, 1); saveTodos(); renderTodos(); }
        function clearCompletedTodos() { todos = todos.filter(t => !t.completed); saveTodos(); renderTodos(); }
        let countdownInterval = null; let countdownTimeLeft = 0;
        function setCountdownTime() { const min = parseInt(document.getElementById('cd-minutes').value) || 0; const sec = parseInt(document.getElementById('cd-seconds').value) || 0; countdownTimeLeft = (min * 60 + sec) * 1000; updateCountdownDisplay(); }
        function updateCountdownDisplay() { const el = document.getElementById('countdown-display'); if (!el) return; const totalSec = Math.ceil(countdownTimeLeft / 1000); const m = Math.floor(totalSec / 60); const s = totalSec % 60; el.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        function startCountdown() { if (countdownInterval) clearInterval(countdownInterval); if (countdownTimeLeft <= 0) setCountdownTime(); const startBtn = document.getElementById('cd-start'); if (startBtn) startBtn.textContent = 'Running...'; countdownInterval = setInterval(() => { countdownTimeLeft -= 1000; updateCountdownDisplay(); if (countdownTimeLeft <= 0) { clearInterval(countdownInterval); countdownTimeLeft = 0; const el = document.getElementById('countdown-display'); if (el) el.textContent = '00:00'; alert('⏰ Time is up!'); if (startBtn) startBtn.textContent = 'Start'; } }, 1000); }
        function pauseCountdown() { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; const startBtn = document.getElementById('cd-start'); if (startBtn) startBtn.textContent = 'Resume'; } }
        function resetCountdown() { if (countdownInterval) clearInterval(countdownInterval); countdownTimeLeft = 0; const el = document.getElementById('countdown-display'); if (el) el.textContent = '05:00'; const startBtn = document.getElementById('cd-start'); if (startBtn) startBtn.textContent = 'Start'; }
        let swInterval = null; let swStartTime = 0; let swElapsed = 0; let laps = [];
        function updateStopwatch() { const display = document.getElementById('stopwatch-display'); if (!display) return; const now = Date.now(); const diff = now - swStartTime + swElapsed; const minutes = Math.floor(diff / 60000); const seconds = Math.floor((diff % 60000) / 1000); const ms = Math.floor((diff % 1000) / 10); display.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`; }
        function startStopwatch() { const btn = document.getElementById('sw-start'); if (!btn) return; if (swInterval) { clearInterval(swInterval); swInterval = null; swElapsed += Date.now() - swStartTime; btn.textContent = 'Resume'; btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700'); btn.classList.add('bg-amber-500', 'hover:bg-amber-600'); } else { swStartTime = Date.now(); swInterval = setInterval(updateStopwatch, 10); btn.textContent = 'Pause'; btn.classList.add('bg-emerald-600', 'hover:bg-emerald-700'); btn.classList.remove('bg-amber-500', 'hover:bg-amber-600'); } }
        function lapStopwatch() { const display = document.getElementById('stopwatch-display'); if (!display || !swInterval) return; const lapTime = display.textContent; laps.unshift(lapTime); const container = document.getElementById('laps-list'); if (container) { const lapEl = document.createElement('div'); lapEl.className = 'flex justify-between text-xs px-3 py-1.5 bg-white dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl'; lapEl.innerHTML = `<span class="text-zinc-500">Lap ${laps.length}</span> <span class="font-mono">${lapTime}</span>`; container.prepend(lapEl); } }
        function resetStopwatch() { if (swInterval) clearInterval(swInterval); swInterval = null; swElapsed = 0; laps = []; const display = document.getElementById('stopwatch-display'); if (display) display.textContent = '00:00.00'; const btn = document.getElementById('sw-start'); if (btn) { btn.textContent = 'Start'; btn.classList.remove('bg-amber-500', 'hover:bg-amber-600'); btn.classList.add('bg-emerald-600', 'hover:bg-emerald-700'); } const lapsContainer = document.getElementById('laps-list'); if (lapsContainer) lapsContainer.innerHTML = ''; }
        const unitData = { length: { units: ['Meters', 'Kilometers', 'Centimeters', 'Millimeters', 'Feet', 'Inches'], factors: [1, 0.001, 100, 1000, 3.28084, 39.3701] }, weight: { units: ['Kilograms', 'Grams', 'Pounds', 'Ounces'], factors: [1, 1000, 2.20462, 35.274] }, temperature: { units: ['Celsius', 'Fahrenheit', 'Kelvin'] } };
        function updateConverterUnits() { const type = document.getElementById('conv-type').value; const fromSel = document.getElementById('conv-from'); const toSel = document.getElementById('conv-to'); fromSel.innerHTML = ''; toSel.innerHTML = ''; unitData[type].units.forEach((u, i) => { fromSel.innerHTML += `<option value="${i}">${u}</option>`; toSel.innerHTML += `<option value="${i}">${u}</option>`; }); toSel.selectedIndex = 1; fromSel.onchange = convertUnits; toSel.onchange = convertUnits; document.getElementById('conv-value').oninput = convertUnits; convertUnits(); }
        function convertUnits() { const type = document.getElementById('conv-type').value; const fromIdx = parseInt(document.getElementById('conv-from').value); const toIdx = parseInt(document.getElementById('conv-to').value); const val = parseFloat(document.getElementById('conv-value').value) || 0; const resultEl = document.getElementById('conv-result'); let result; if (type === 'temperature') { let celsius; if (fromIdx === 0) celsius = val; else if (fromIdx === 1) celsius = (val - 32) * 5/9; else celsius = val - 273.15; if (toIdx === 0) result = celsius; else if (toIdx === 1) result = celsius * 9/5 + 32; else result = celsius + 273.15; } else { const fromFactor = unitData[type].factors[fromIdx]; const toFactor = unitData[type].factors[toIdx]; result = (val / fromFactor) * toFactor; } resultEl.textContent = result.toFixed(4).replace(/\.?0+$/, ''); }
        function swapUnits() { const from = document.getElementById('conv-from'); const to = document.getElementById('conv-to'); const temp = from.value; from.value = to.value; to.value = temp; convertUnits(); }
        function calculateBMI() { const h = parseFloat(document.getElementById('bmi-height').value); const w = parseFloat(document.getElementById('bmi-weight').value); const resultBox = document.getElementById('bmi-result'); if (!h || !w) { resultBox.classList.add('hidden'); return; } const bmi = w / ((h / 100) ** 2); const valueEl = document.getElementById('bmi-value'); const catEl = document.getElementById('bmi-category'); valueEl.textContent = bmi.toFixed(1); let category = '', color = ''; if (bmi < 18.5) { category = 'Underweight'; color = 'bg-blue-100 text-blue-700 dark:bg-blue-950 dark:text-blue-300'; } else if (bmi < 25) { category = 'Normal weight'; color = 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300'; } else if (bmi < 30) { category = 'Overweight'; color = 'bg-amber-100 text-amber-700 dark:bg-amber-950 dark:text-amber-300'; } else { category = 'Obese'; color = 'bg-red-100 text-red-700 dark:bg-red-950 dark:text-red-300'; } catEl.textContent = category; catEl.className = `inline-block px-4 py-1 rounded-full text-sm font-medium mt-1 ${color}`; resultBox.classList.remove('hidden'); }
        function calculateAge() { const dobStr = document.getElementById('age-dob').value; if (!dobStr) return; const dob = new Date(dobStr); const now = new Date(); let years = now.getFullYear() - dob.getFullYear(); let months = now.getMonth() - dob.getMonth(); let days = now.getDate() - dob.getDate(); if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); } if (months < 0) { years--; months += 12; } document.getElementById('age-years').textContent = years; document.getElementById('age-details').textContent = `${months} months, ${days} days`; document.getElementById('age-result').classList.remove('hidden'); }
        function updatePasswordLength() { const range = document.getElementById('pw-length'); const val = document.getElementById('pw-length-value'); if (range && val) val.textContent = range.value; }
        function generatePassword() { const length = parseInt(document.getElementById('pw-length').value); const upper = document.getElementById('pw-upper').checked; const lower = document.getElementById('pw-lower').checked; const numbers = document.getElementById('pw-numbers').checked; const symbols = document.getElementById('pw-symbols').checked; let chars = ''; if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; if (lower) chars += 'abcdefghijklmnopqrstuvwxyz'; if (numbers) chars += '0123456789'; if (symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?'; if (!chars) { alert('Please select at least one character type.'); return; } let password = ''; for (let i = 0; i < length; i++) { password += chars.charAt(Math.floor(Math.random() * chars.length)); } const output = document.getElementById('pw-output'); output.value = password; updatePasswordStrength(password); }
        function updatePasswordStrength(pw) { const bar = document.getElementById('pw-strength-bar'); const text = document.getElementById('pw-strength-text'); if (!bar || !text) return; let score = 0; if (pw.length >= 8) score++; if (pw.length >= 12) score++; if (/[A-Z]/.test(pw)) score++; if (/[0-9]/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++; const percent = Math.min(100, score * 20); bar.style.width = percent + '%'; if (score <= 2) { bar.style.backgroundColor = '#f87171'; text.textContent = 'Weak'; text.style.color = '#f87171'; } else if (score <= 3) { bar.style.backgroundColor = '#fbbf24'; text.textContent = 'Medium'; text.style.color = '#fbbf24'; } else { bar.style.backgroundColor = '#34d399'; text.textContent = 'Strong'; text.style.color = '#34d399'; } }
        function copyPassword() { const output = document.getElementById('pw-output'); if (!output || !output.value) return; navigator.clipboard.writeText(output.value).then(() => { const orig = output.value; output.value = 'Copied!'; setTimeout(() => { output.value = orig; }, 1200); }); }
        function updateTextStats() { const input = document.getElementById('text-input').value; document.getElementById('text-chars').textContent = input.length; document.getElementById('text-words').textContent = input.trim() ? input.trim().split(/\s+/).length : 0; document.getElementById('text-sentences').textContent = input.split(/[.!?]+/).filter(Boolean).length; }
        function transformText(type) { const textarea = document.getElementById('text-input'); let text = textarea.value; if (type === 'upper') text = text.toUpperCase(); else if (type === 'lower') text = text.toLowerCase(); else if (type === 'capitalize') { text = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); } else if (type === 'remove-spaces') { text = text.replace(/\s+/g, ' ').trim(); } textarea.value = text; updateTextStats(); }
        function copyTextOutput() { const textarea = document.getElementById('text-input'); if (!textarea.value) return; navigator.clipboard.writeText(textarea.value).then(() => { alert('Text copied to clipboard!'); }); }
        function clearText() { const ta = document.getElementById('text-input'); ta.value = ''; updateTextStats(); }
        function initToolsPage() { renderToolCards(); initToolSearch(); document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { const modal = document.getElementById('tool-modal'); if (!modal.classList.contains('hidden')) closeModal(); } }); document.addEventListener('keydown', (e) => { if (e.key === '/' && document.activeElement.tagName === 'BODY') { e.preventDefault(); document.getElementById('tool-search').focus(); } }); }
        window.onload = function() { initToolsPage(); };
    </script>
