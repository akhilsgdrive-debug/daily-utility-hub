<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free strong password generator. Create secure, random passwords instantly.">
    <title>Strong Password Generator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-md mx-auto px-6 py-10">
        <a href="../tools.html" class="text-sm">← Back to Tools</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-4">Password Generator</h1>
        <p class="mt-2 text-zinc-600 dark:text-zinc-400">Generate strong, secure passwords instantly. Protect your accounts.</p>

        <div class="mt-8">
            <label class="text-sm">Password Length</label>
            <input id="length" type="number" value="16" class="w-full mt-1 px-4 py-3 rounded-2xl border">
            <button onclick="generatePassword()" class="mt-4 w-full py-4 rounded-2xl bg-zinc-900 text-white font-medium">Generate Strong Password</button>
            <div id="result" class="mt-4 p-4 rounded-2xl border font-mono break-all hidden"></div>
        </div>

        <div class="mt-8 text-sm text-zinc-600 dark:text-zinc-400">
            <h3 class="font-semibold text-zinc-900 dark:text-white">Why use strong passwords?</h3>
            <p class="mt-1">Strong passwords protect your accounts from hacking attempts. Always use unique passwords for important services.</p>
        </div>
    </div>
    <script>
        function generatePassword() {
            const length = document.getElementById('length').value || 16;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+';
            let pass = '';
            for (let i = 0; i < length; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const result = document.getElementById('result');
            result.textContent = pass;
            result.classList.remove('hidden');
        }
    </script>
</body>
</html>
