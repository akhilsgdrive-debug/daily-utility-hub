<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free strong password generator.">
    <title>Password Generator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 py-12">
    <div class="max-w-md mx-auto px-6">
        <h1 class="text-4xl font-semibold">Password Generator</h1>
        <button onclick="gen()" class="mt-8 w-full py-4 bg-zinc-900 text-white rounded-2xl">Generate Password</button>
        <div id="r" class="mt-4 p-4 rounded-2xl border font-mono hidden"></div>
    </div>
    <script>function gen(){let p='';const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$';for(let i=0;i<16;i++)p+=c[Math.floor(Math.random()*c.length)];const r=document.getElementById('r');r.textContent=p;r.classList.remove('hidden');}</script>
</body>
</html>
