<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free strong password generator.">
    <title>Password Generator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-md mx-auto px-6 py-10">
        <h1 class="text-4xl font-semibold tracking-tighter">Password Generator</h1>
        <input id="length" type="number" value="16" class="mt-6 w-full px-4 py-3 rounded-2xl border border-zinc-700 bg-zinc-900">
        <button onclick="generate()" class="mt-4 w-full py-4 bg-white text-zinc-900 rounded-2xl">Generate Password</button>
        <div id="result" class="hidden mt-4 p-4 rounded-2xl border border-zinc-700 font-mono break-all"></div>
    </div>
    <script>
        function generate() {
            const len = document.getElementById('length').value;
            let pass = '';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            for(let i=0; i<len; i++) pass += chars[Math.floor(Math.random()*chars.length)];
            const r = document.getElementById('result');
            r.textContent = pass;
            r.classList.remove('hidden');
        }
    </script>
</body>
</html>
