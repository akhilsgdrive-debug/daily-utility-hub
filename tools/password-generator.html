<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Password Generator • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-2xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>Password Generator</h1><label class='text-sm text-zinc-400 mt-8 block'>Length</label><input id='length' type='number' value='16' class='mt-1 w-full px-4 py-3 rounded-2xl border border-zinc-700 bg-zinc-900'><button onclick='generate()' class='mt-4 w-full py-4 rounded-2xl bg-white text-zinc-900 font-medium'>Generate Password</button><div id='result' class='hidden mt-4 p-4 rounded-2xl border border-zinc-700 font-mono break-all'></div></div><script>function generate(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*';let p='';const l=Math.max(4,parseInt(length.value||16));for(let i=0;i<l;i++)p+=chars[Math.floor(Math.random()*chars.length)];result.classList.remove('hidden');result.textContent=p;}</script></body></html>
