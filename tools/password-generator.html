<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free strong password generator.">
    <title>Password Generator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-md mx-auto px-6 py-10">
        <a href="../tools.html" class="text-sm text-zinc-400">← Back</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-6">Password Generator</h1>
        <div class="mt-8">
            <label class="text-sm text-zinc-400">Length</label>
            <input id="length" type="number" value="16" class="mt-1 w-full px-4 py-3 rounded-2xl border border-zinc-700 bg-zinc-900">
            <button onclick="generate()" class="mt-4 w-full py-4 rounded-2xl bg-white text-zinc-900 font-medium">Generate Password</button>
            <div id="result" class="hidden mt-4 p-4 rounded-2xl border border-zinc-700 font-mono break-all"></div>
        </div>
    </div>
    <script>
        function generate() {
            const len = document.getElementById('length').value;
            let p = '';
            const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            for (let i = 0; i < len; i++) p += c[Math.floor(Math.random() * c.length)];
            const r = document.getElementById('result');
            r.textContent = p;
            r.classList.remove('hidden');
        }
    </script>
</body>
</html>
