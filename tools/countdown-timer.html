<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online countdown timer.">
    <title>Countdown Timer • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-center py-12">
    <h1 class="text-4xl font-semibold">Countdown Timer</h1>
    <div id="d" class="my-10 text-7xl font-mono">05:00</div>
    <button onclick="start()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl">Start</button>
    <script>function start(){let t=5*60;const i=setInterval(()=>{t--;const m=Math.floor(t/60);document.getElementById('d').textContent=`${m}:${(t%60).toString().padStart(2,'0')}`;if(t<=0)clearInterval(i)},1000)}</script>
</body>
</html>
