<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online countdown timer. Set timers for work, study, or cooking.">
    <title>Free Countdown Timer • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-center py-12">
    <div class="max-w-md mx-auto px-6">
        <a href="../tools.html" class="text-sm">← Back</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-4">Countdown Timer</h1>
        <p class="mt-2 text-zinc-400">Set a timer and get notified when time is up.</p>

        <div id="display" class="my-10 text-7xl font-mono font-semibold tracking-tighter">05:00</div>

        <div class="flex justify-center gap-3">
            <input id="min" type="number" value="5" class="w-20 text-center px-4 py-3 rounded-2xl border">
            <button onclick="startTimer()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl">Start</button>
            <button onclick="resetTimer()" class="px-6 py-3 border rounded-2xl">Reset</button>
        </div>

        <div class="mt-10 text-left text-sm text-zinc-400 max-w-xs mx-auto">
            <strong>Tips:</strong> Use it for Pomodoro (25 min), cooking, or focused work sessions.
        </div>
    </div>
    <script>
        let interval;
        function startTimer() {
            clearInterval(interval);
            let time = parseInt(document.getElementById('min').value) * 60;
            interval = setInterval(() => {
                time--;
                const m = Math.floor(time / 60);
                document.getElementById('display').textContent = `${m.toString().padStart(2,'0')}:${(time%60).toString().padStart(2,'0')}`;
                if (time <= 0) { clearInterval(interval); alert('Time is up!'); }
            }, 1000);
        }
        function resetTimer() {
            clearInterval(interval);
            document.getElementById('display').textContent = '05:00';
        }
    </script>
</body>
</html>
