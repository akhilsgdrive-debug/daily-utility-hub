<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Free Countdown Timer • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-2xl mx-auto px-6 py-10 text-center'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>Countdown Timer</h1><div id='display' class='my-10 text-7xl font-mono font-semibold'>05:00</div><div class='flex justify-center gap-3'><input id='min' type='number' value='5' class='w-24 text-center px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><button onclick='startTimer()' class='px-8 py-3 bg-emerald-600 text-white rounded-2xl'>Start</button><button onclick='stopTimer()' class='px-6 py-3 border border-zinc-700 rounded-2xl'>Stop</button></div></div><script>let i=null,left=300;function render(){const m=Math.floor(left/60),s=left%60;display.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}function startTimer(){left=Math.max(0,parseInt(min.value||0)*60);render();clearInterval(i);i=setInterval(()=>{if(left<=0){clearInterval(i);alert('Time up!');return;}left--;render();},1000)}function stopTimer(){clearInterval(i)}</script></body></html>
