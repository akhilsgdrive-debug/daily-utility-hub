<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>To-Do List • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-3xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>To-Do List</h1><div class='flex gap-3 mt-6'><input id='task' class='flex-1 px-4 py-3.5 rounded-2xl border border-zinc-700 bg-zinc-900' placeholder='Add new task'><button onclick='addTask()' class='px-8 bg-white text-zinc-900 rounded-2xl font-medium'>Add</button></div><ul id='list' class='mt-6 space-y-2'></ul></div><script>let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');function render(){list.innerHTML=tasks.map((t,i)=>`<li class='px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-800 flex justify-between'><span>${t}</span><button onclick='del(${i})'>✕</button></li>`).join('');localStorage.setItem('tasks',JSON.stringify(tasks));}function addTask(){if(!task.value.trim())return;tasks.push(task.value.trim());task.value='';render()}function del(i){tasks.splice(i,1);render()}render();</script></body></html>
