<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online to-do list.">
    <title>To-Do List • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-xl mx-auto px-6 py-10">
        <h1 class="text-4xl font-semibold tracking-tighter">To-Do List</h1>
        <div class="flex gap-2 mt-6">
            <input id="task" class="flex-1 px-4 py-3 rounded-2xl border border-zinc-700 bg-zinc-900">
            <button onclick="addTask()" class="px-6 bg-white text-zinc-900 rounded-2xl">Add</button>
        </div>
        <ul id="list" class="mt-6 space-y-2"></ul>
    </div>
    <script>
        function addTask() {
            const input = document.getElementById('task');
            if (!input.value.trim()) return;
            const li = document.createElement('li');
            li.className = 'p-4 border border-zinc-700 rounded-2xl flex justify-between';
            li.innerHTML = `<span>${input.value}</span> <button onclick="this.parentElement.remove()" class="text-red-400">Delete</button>`;
            document.getElementById('list').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
