<!DOCTYPE html><html lang="en" class="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Free private online notes app."><title>Notes • Daily Utility Hub</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-zinc-950 text-zinc-100"><div class="max-w-4xl mx-auto px-6 py-10"><a href="../tools.html" class="text-sm text-zinc-400">← Back to Tools</a><h1 class="text-5xl font-semibold tracking-tighter mt-4">Notes</h1><textarea id="note" class="mt-6 w-full h-96 p-6 rounded-3xl border border-zinc-700 bg-zinc-900 text-lg"></textarea><div class="flex gap-3 mt-4"><button onclick="saveNote()" class="px-8 py-3.5 bg-white text-zinc-900 rounded-2xl font-medium">Save Note</button><button onclick="clearNote()" class="px-6 py-3.5 border border-zinc-700 rounded-2xl">Clear</button></div></div><script>const ta=document.getElementById('note');ta.value=localStorage.getItem('daily_notes')||'';function saveNote(){localStorage.setItem('daily_notes',ta.value)}function clearNote(){ta.value='';localStorage.removeItem('daily_notes')}</script></body></html>
