<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online notes app. Write and save private notes instantly.">
    <title>Free Online Notes App • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 py-10">
    <div class="max-w-2xl mx-auto px-6">
        <h1 class="text-4xl font-semibold">Notes</h1>
        <textarea id="note" class="mt-6 w-full h-80 p-6 rounded-3xl border"></textarea>
        <button onclick="save()" class="mt-4 px-8 py-3 bg-zinc-900 text-white rounded-2xl">Save</button>
    </div>
    <script>const t=document.getElementById('note');t.value=localStorage.getItem('note')||'';function save(){localStorage.setItem('note',t.value);alert('Saved!')}</script>
</body>
</html>
