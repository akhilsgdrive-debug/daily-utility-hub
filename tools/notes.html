<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free private online notes app. Write, edit and save notes instantly in your browser. No sign-up.">
    <title>Free Online Notes App • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-2xl mx-auto px-6 py-10">
        <a href="../tools.html" class="text-sm">← Back</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-4">Free Online Notes</h1>
        <p class="mt-2 text-zinc-600 dark:text-zinc-400">Write and save private notes that stay in your browser. Nothing is sent to any server.</p>

        <textarea id="note" class="mt-6 w-full h-80 p-6 rounded-3xl border text-lg" placeholder="Start writing your notes here..."></textarea>
        <button onclick="saveNote()" class="mt-4 px-8 py-3 bg-zinc-900 text-white rounded-2xl">Save Note</button>

        <div class="mt-8 text-sm text-zinc-600 dark:text-zinc-400">
            <h3 class="font-semibold">Features</h3>
            <ul class="list-disc pl-5 mt-2 space-y-1">
                <li>Auto-saves in your browser</li>
                <li>Completely private</li>
                <li>Works offline</li>
                <li>No account needed</li>
            </ul>
        </div>
    </div>
    <script>
        const textarea = document.getElementById('note');
        textarea.value = localStorage.getItem('daily_notes') || '';
        function saveNote() {
            localStorage.setItem('daily_notes', textarea.value);
            alert('Note saved successfully!');
        }
    </script>
</body>
</html>
