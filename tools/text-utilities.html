<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Text Utilities • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-4xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>Text Utilities</h1><textarea id='text' class='mt-6 w-full h-52 p-4 rounded-3xl bg-zinc-900 border border-zinc-700' placeholder='Paste your text here...'></textarea><div class='flex flex-wrap gap-2 mt-4'><button onclick='countWords()' class='px-5 py-2.5 border border-zinc-700 rounded-2xl'>Count Words</button><button onclick='toUpper()' class='px-5 py-2.5 border border-zinc-700 rounded-2xl'>UPPERCASE</button><button onclick='toLower()' class='px-5 py-2.5 border border-zinc-700 rounded-2xl'>lowercase</button></div><div id='result' class='mt-4 p-4 rounded-2xl border border-zinc-700 hidden'></div></div><script>const t=document.getElementById('text'),r=document.getElementById('result');function countWords(){r.classList.remove('hidden');r.textContent=`Words: ${t.value.trim()?t.value.trim().split(/\s+/).length:0}`;}function toUpper(){t.value=t.value.toUpperCase()}function toLower(){t.value=t.value.toLowerCase()}</script></body></html>
