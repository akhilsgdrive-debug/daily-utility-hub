<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free text utilities online.">
    <title>Text Utilities • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 py-12">
    <div class="max-w-2xl mx-auto px-6">
        <h1 class="text-4xl font-semibold">Text Utilities</h1>
        <textarea id="t" class="mt-6 w-full h-40 p-4 rounded-3xl border"></textarea>
        <div class="flex gap-2 mt-4"><button onclick="count()" class="px-5 py-2 border rounded-2xl">Count Words</button><button onclick="upper()" class="px-5 py-2 border rounded-2xl">UPPER</button></div>
        <div id="r" class="mt-4 p-4 rounded-2xl border hidden"></div>
    </div>
    <script>function count(){const w=document.getElementById('t').value.trim().split(/\s+/).length;document.getElementById('r').textContent='Words: '+w;document.getElementById('r').classList.remove('hidden');}function upper(){document.getElementById('t').value=document.getElementById('t').value.toUpperCase();}</script>
</body>
</html>
