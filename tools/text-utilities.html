<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free text tools: Word counter, UPPERCASE, lowercase converter.">
    <title>Text Utilities • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-2xl mx-auto px-6 py-10">
        <h1 class="text-4xl font-semibold tracking-tighter">Text Utilities</h1>
        <textarea id="text" class="mt-6 w-full h-40 p-4 rounded-3xl border" placeholder="Paste your text here..."></textarea>
        <div class="flex flex-wrap gap-2 mt-4">
            <button onclick="countWords()" class="px-5 py-2.5 border rounded-2xl">Count Words</button>
            <button onclick="toUpper()" class="px-5 py-2.5 border rounded-2xl">UPPERCASE</button>
            <button onclick="toLower()" class="px-5 py-2.5 border rounded-2xl">lowercase</button>
        </div>
        <div id="result" class="mt-4 p-4 rounded-2xl border hidden"></div>
    </div>
    <script>
        function countWords() {
            const words = document.getElementById('text').value.trim().split(/\s+/).length;
            document.getElementById('result').textContent = `Word count: ${words}`;
            document.getElementById('result').classList.remove('hidden');
        }
        function toUpper() { document.getElementById('text').value = document.getElementById('text').value.toUpperCase(); }
        function toLower() { document.getElementById('text').value = document.getElementById('text').value.toLowerCase(); }
    </script>
</body>
</html>
