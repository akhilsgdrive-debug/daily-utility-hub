<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>BMI Calculator • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-2xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>BMI Calculator</h1><div class='mt-8 space-y-4'><input id='height' type='number' placeholder='Height in cm' class='w-full px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><input id='weight' type='number' placeholder='Weight in kg' class='w-full px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><button onclick='calculateBMI()' class='w-full py-4 bg-white text-zinc-900 rounded-2xl'>Calculate BMI</button><div id='result' class='hidden p-6 rounded-3xl border border-zinc-700 text-center'></div></div></div><script>function calculateBMI(){const h=parseFloat(height.value)/100,w=parseFloat(weight.value);if(!h||!w)return;const bmi=(w/(h*h)).toFixed(1);result.classList.remove('hidden');result.textContent=`Your BMI is ${bmi}`;}</script></body></html>
