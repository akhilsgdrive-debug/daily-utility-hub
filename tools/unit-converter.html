<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online unit converter.">
    <title>Unit Converter • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 py-12">
    <div class="max-w-md mx-auto px-6">
        <h1 class="text-4xl font-semibold">Unit Converter</h1>
        <input id="v" type="number" value="1" class="mt-6 w-full px-4 py-3 rounded-2xl border">
        <button onclick="conv()" class="mt-4 w-full py-3 bg-zinc-900 text-white rounded-2xl">Convert Meters to KM</button>
        <div id="r" class="mt-4 p-4 rounded-2xl border hidden"></div>
    </div>
    <script>function conv(){const v=parseFloat(document.getElementById('v').value);document.getElementById('r').textContent=(v/1000)+' km';document.getElementById('r').classList.remove('hidden');}</script>
</body>
</html>
