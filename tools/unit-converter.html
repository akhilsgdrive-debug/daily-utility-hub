<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Unit Converter • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-2xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>Unit Converter</h1><input id='value' type='number' value='1' class='mt-8 w-full px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><div class='grid grid-cols-2 gap-3 mt-3'><select id='from' class='px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><option value='m'>Meters</option><option value='km'>Kilometers</option></select><select id='to' class='px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><option value='km'>Kilometers</option><option value='m'>Meters</option></select></div><button onclick='convert()' class='mt-4 w-full py-4 bg-white text-zinc-900 rounded-2xl'>Convert</button><div id='result' class='hidden mt-4 p-4 rounded-2xl border border-zinc-700'></div></div><script>function convert(){const v=parseFloat(value.value||0);const f=from.value,t=to.value;let out=v;if(f==='m'&&t==='km')out=v/1000;if(f==='km'&&t==='m')out=v*1000;result.classList.remove('hidden');result.textContent=`${v} ${f} = ${out} ${t}`;}</script></body></html>
