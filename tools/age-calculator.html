<!DOCTYPE html><html lang='en' class='dark'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Age Calculator • Daily Utility Hub</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-zinc-950 text-zinc-100'><div class='max-w-2xl mx-auto px-6 py-10'><a href='../tools.html' class='text-sm text-zinc-400'>← Back to Tools</a><h1 class='text-5xl font-semibold tracking-tighter mt-4'>Age Calculator</h1><input id='dob' type='date' class='mt-8 w-full px-4 py-3 rounded-2xl bg-zinc-900 border border-zinc-700'><button onclick='calculateAge()' class='mt-4 w-full py-4 bg-white text-zinc-900 rounded-2xl'>Calculate Age</button><div id='result' class='hidden mt-6 p-6 rounded-3xl border border-zinc-700 text-center text-xl'></div></div><script>function calculateAge(){const dob=new Date(document.getElementById('dob').value);if(isNaN(dob))return;const now=new Date();let y=now.getFullYear()-dob.getFullYear();const m=now.getMonth()-dob.getMonth();if(m<0||(m===0&&now.getDate()<dob.getDate()))y--;const r=document.getElementById('result');r.classList.remove('hidden');r.textContent=`You are ${y} years old.`;}</script></body></html>
