<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online age calculator. Calculate your exact age from date of birth.">
    <title>Age Calculator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-md mx-auto px-6 py-10">
        <h1 class="text-4xl font-semibold tracking-tighter">Age Calculator</h1>
        <p class="mt-2 text-zinc-400">Find out your exact age in years.</p>

        <input id="dob" type="date" class="mt-8 w-full px-4 py-3 rounded-2xl border">
        <button onclick="calculateAge()" class="mt-4 w-full py-4 bg-zinc-900 text-white rounded-2xl">Calculate Age</button>
        <div id="result" class="hidden mt-6 p-6 rounded-3xl border text-center text-xl"></div>
    </div>
    <script>
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            if (!dob.getTime()) return alert('Please select a valid date');
            const age = Math.floor((Date.now() - dob) / 31557600000);
            document.getElementById('result').innerHTML = `You are <strong>${age}</strong> years old`;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
