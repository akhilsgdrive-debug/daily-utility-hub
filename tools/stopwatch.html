<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online stopwatch. Track elapsed time accurately.">
    <title>Online Stopwatch • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-center py-12">
    <div class="max-w-md mx-auto px-6">
        <h1 class="text-4xl font-semibold tracking-tighter">Stopwatch</h1>
        <p class="mt-2 text-zinc-400">Track time with precision. Great for workouts, tasks, or timing anything.</p>

        <div id="display" class="my-10 text-7xl font-mono font-semibold tracking-tighter">00:00.00</div>

        <div class="flex justify-center gap-3">
            <button onclick="start()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl">Start</button>
            <button onclick="pause()" class="px-6 py-3 border rounded-2xl">Pause</button>
            <button onclick="reset()" class="px-6 py-3 border rounded-2xl">Reset</button>
        </div>
    </div>
    <script>
        let time = 0, interval;
        function start() { clearInterval(interval); interval = setInterval(() => { time += 10; updateDisplay(); }, 10); }
        function pause() { clearInterval(interval); }
        function reset() { clearInterval(interval); time = 0; updateDisplay(); }
        function updateDisplay() {
            const m = Math.floor(time / 60000);
            const s = Math.floor((time % 60000) / 1000);
            const ms = Math.floor((time % 1000) / 10);
            document.getElementById('display').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
