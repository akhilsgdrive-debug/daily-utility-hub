<!DOCTYPE html><html lang="en" class="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Free online stopwatch. Track elapsed time accurately."><title>Online Stopwatch • Daily Utility Hub</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-zinc-950 text-zinc-100"><div class="max-w-3xl mx-auto px-6 py-10"><a href="../tools.html" class="text-sm text-zinc-400">← Back to Tools</a><h1 class="text-5xl font-semibold tracking-tighter mt-4">Stopwatch</h1><p class="text-zinc-400 mt-2">Track time with precision.</p><div class="mt-8 bg-zinc-900 border border-zinc-800 rounded-3xl p-8 text-center"><div id="display" class="text-7xl font-mono font-semibold tracking-tighter">00:00.00</div><div class="flex justify-center gap-3 mt-8"><button onclick="start()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl">Start</button><button onclick="pause()" class="px-6 py-3 border border-zinc-700 rounded-2xl">Pause</button><button onclick="reset()" class="px-6 py-3 border border-zinc-700 rounded-2xl">Reset</button></div></div></div><script>let t=0,i=null;const d=document.getElementById('display');function render(){const ms=t%1000,s=Math.floor(t/1000)%60,m=Math.floor(t/60000);d.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(Math.floor(ms/10)).padStart(2,'0')}`;}function start(){if(i)return;const st=Date.now()-t;i=setInterval(()=>{t=Date.now()-st;render();},10)}function pause(){clearInterval(i);i=null}function reset(){pause();t=0;render()}</script></body></html>
