<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online calculator. Perform basic arithmetic operations instantly. No sign-up required. Fast and private.">
    <meta name="keywords" content="free online calculator, calculator online, simple calculator">
    <title>Free Online Calculator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-md mx-auto px-6 py-12">
        <a href="../tools.html" class="text-sm">← Back to Tools</a>
        <h1 class="text-4xl font-semibold mt-4">Calculator</h1>
        <input id="display" class="mt-6 w-full text-right text-4xl p-6 rounded-3xl border" readonly value="0">
        <div class="grid grid-cols-4 gap-2 mt-4">
            <button onclick="clearCalc()" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">C</button>
            <button onclick="append('/')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">÷</button>
            <button onclick="append('*')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">×</button>
            <button onclick="append('-')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">−</button>
            <button onclick="append('7')" class="p-5 rounded-2xl">7</button>
            <button onclick="append('8')" class="p-5 rounded-2xl">8</button>
            <button onclick="append('9')" class="p-5 rounded-2xl">9</button>
            <button onclick="append('+')" class="row-span-2 p-5 rounded-2xl bg-zinc-900 text-white">+</button>
            <button onclick="append('4')" class="p-5 rounded-2xl">4</button>
            <button onclick="append('5')" class="p-5 rounded-2xl">5</button>
            <button onclick="append('6')" class="p-5 rounded-2xl">6</button>
            <button onclick="calculate()" class="row-span-2 p-5 rounded-2xl bg-emerald-600 text-white">=</button>
            <button onclick="append('1')" class="p-5 rounded-2xl">1</button>
            <button onclick="append('2')" class="p-5 rounded-2xl">2</button>
            <button onclick="append('3')" class="p-5 rounded-2xl">3</button>
            <button onclick="append('0')" class="col-span-2 p-5 rounded-2xl">0</button>
            <button onclick="append('.')" class="p-5 rounded-2xl">.</button>
        </div>
    </div>
    <script>
        let d = document.getElementById('display');
        function append(v){ if(d.value==='0'&&v!=='.')d.value=''; d.value+=v; }
        function clearCalc(){ d.value='0'; }
        function calculate(){ try{d.value=eval(d.value)}catch{d.value='Error'} }
    </script>
</body>
</html>
