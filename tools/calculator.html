<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online calculator. Fast, simple and private.">
    <title>Free Online Calculator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-sm mx-auto px-6 py-10">
        <a href="../tools.html" class="text-sm text-zinc-400">← Back to Tools</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-6">Calculator</h1>

        <input id="display" type="text" value="0" readonly class="mt-8 w-full text-right text-5xl font-mono bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-6">

        <div class="grid grid-cols-4 gap-3 mt-6">
            <button onclick="clearCalc()" class="col-span-1 p-6 rounded-2xl bg-zinc-800 active:bg-zinc-700">C</button>
            <button onclick="appendToCalc('/')" class="p-6 rounded-2xl bg-zinc-800 active:bg-zinc-700">÷</button>
            <button onclick="appendToCalc('*')" class="p-6 rounded-2xl bg-zinc-800 active:bg-zinc-700">×</button>
            <button onclick="appendToCalc('-')" class="p-6 rounded-2xl bg-zinc-800 active:bg-zinc-700">−</button>

            <button onclick="appendToCalc('7')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">7</button>
            <button onclick="appendToCalc('8')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">8</button>
            <button onclick="appendToCalc('9')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">9</button>
            <button onclick="appendToCalc('+')" class="row-span-2 p-6 rounded-2xl bg-zinc-800 active:bg-zinc-700">+</button>

            <button onclick="appendToCalc('4')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">4</button>
            <button onclick="appendToCalc('5')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">5</button>
            <button onclick="appendToCalc('6')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">6</button>

            <button onclick="appendToCalc('1')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">1</button>
            <button onclick="appendToCalc('2')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">2</button>
            <button onclick="appendToCalc('3')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">3</button>
            <button onclick="calculate()" class="row-span-2 p-6 rounded-2xl bg-emerald-600 active:bg-emerald-700">=</button>

            <button onclick="appendToCalc('0')" class="col-span-2 p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">0</button>
            <button onclick="appendToCalc('.')" class="p-6 rounded-2xl bg-zinc-900 active:bg-zinc-800">.</button>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendToCalc(val) { if (display.value === '0' && val !== '.') display.value = ''; display.value += val; }
        function clearCalc() { display.value = '0'; }
        function calculate() { try { display.value = eval(display.value); } catch { display.value = 'Error'; } }
    </script>
</body>
</html>
