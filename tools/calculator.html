<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online calculator with basic arithmetic. Fast, private, and works offline. No sign-up needed.">
    <meta name="keywords" content="free online calculator, simple calculator, arithmetic calculator, calculator">
    <title>Free Online Calculator • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950">
    <div class="max-w-md mx-auto px-6 py-10">
        <a href="../tools.html" class="text-sm">← Back to Tools</a>
        <h1 class="text-4xl font-semibold tracking-tighter mt-4">Free Online Calculator</h1>
        <p class="mt-2 text-zinc-600 dark:text-zinc-400">Perform quick calculations instantly. Private and works offline.</p>

        <div class="mt-8">
            <input id="display" type="text" class="w-full text-right text-4xl p-6 rounded-3xl border" readonly value="0">
            <div class="grid grid-cols-4 gap-2 mt-4">
                <button onclick="clearCalc()" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">C</button>
                <button onclick="appendToCalc('/')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">÷</button>
                <button onclick="appendToCalc('*')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">×</button>
                <button onclick="appendToCalc('-')" class="p-5 rounded-2xl bg-zinc-100 dark:bg-zinc-800">−</button>
                <button onclick="appendToCalc('7')" class="p-5 rounded-2xl">7</button>
                <button onclick="appendToCalc('8')" class="p-5 rounded-2xl">8</button>
                <button onclick="appendToCalc('9')" class="p-5 rounded-2xl">9</button>
                <button onclick="appendToCalc('+')" class="row-span-2 p-5 rounded-2xl bg-zinc-900 text-white">+</button>
                <button onclick="appendToCalc('4')" class="p-5 rounded-2xl">4</button>
                <button onclick="appendToCalc('5')" class="p-5 rounded-2xl">5</button>
                <button onclick="appendToCalc('6')" class="p-5 rounded-2xl">6</button>
                <button onclick="calculate()" class="row-span-2 p-5 rounded-2xl bg-emerald-600 text-white">=</button>
                <button onclick="appendToCalc('1')" class="p-5 rounded-2xl">1</button>
                <button onclick="appendToCalc('2')" class="p-5 rounded-2xl">2</button>
                <button onclick="appendToCalc('3')" class="p-5 rounded-2xl">3</button>
                <button onclick="appendToCalc('0')" class="col-span-2 p-5 rounded-2xl">0</button>
                <button onclick="appendToCalc('.')" class="p-5 rounded-2xl">.</button>
            </div>
        </div>

        <div class="mt-10 text-sm text-zinc-600 dark:text-zinc-400">
            <h3 class="font-semibold text-zinc-900 dark:text-white">How to use</h3>
            <p class="mt-1">Click numbers and operators to build your expression. Press <strong>=</strong> to calculate the result. Use <strong>C</strong> to clear.</p>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        function appendToCalc(v) { if (display.value === '0' && v !== '.') display.value = ''; display.value += v; }
        function clearCalc() { display.value = '0'; }
        function calculate() { try { display.value = eval(display.value); } catch { display.value = 'Error'; } }
    </script>
</body>
</html>
