<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the team behind Daily Utility Hub. Feedback, feature requests, or just say hello.">
    <meta property="og:title" content="Contact • Daily Utility Hub">
    <title>Contact • Daily Utility Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
    <nav class="sticky top-0 z-50 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-lg border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-screen-xl mx-auto px-6 flex items-center justify-between h-16">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl tracking-tighter">D</div>
                <span class="font-semibold text-xl tracking-tight">Daily Utility <span class="text-indigo-600 dark:text-indigo-400">Hub</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-indigo-600">Home</a>
                <a href="tools.html" class="hover:text-indigo-600">Tools</a>
                <a href="about.html" class="hover:text-indigo-600">About</a>
                <a href="contact.html" class="text-indigo-600 font-semibold">Contact</a>
            </div>
            <div>
                <button id="dark-mode-toggle" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-900 text-zinc-600 dark:text-zinc-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-semibold tracking-tighter">Get in touch</h1>
        <p class="mt-3 text-lg text-zinc-600 dark:text-zinc-400">We read every message. Feature ideas, bugs, or just feedback — we'd love to hear from you.</p>
        
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="mt-10 space-y-5">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label class="text-xs font-medium text-zinc-500">YOUR NAME</label>
                    <input type="text" name="name" required class="mt-1.5 w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950">
                </div>
                <div>
                    <label class="text-xs font-medium text-zinc-500">EMAIL ADDRESS</label>
                    <input type="email" name="email" required class="mt-1.5 w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950">
                </div>
            </div>
            
            <div>
                <label class="text-xs font-medium text-zinc-500">MESSAGE</label>
                <textarea name="message" rows="6" required placeholder="Tell us what's on your mind..." class="mt-1.5 w-full px-4 py-3.5 rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-950"></textarea>
            </div>
            
            <button type="submit" class="w-full py-4 rounded-2xl bg-zinc-900 hover:bg-black active:bg-zinc-950 text-white font-semibold text-base transition-all">
                Send Message
            </button>
            
            <p class="text-center text-xs text-zinc-500">
                Powered by <a href="https://formspree.io" target="_blank" class="underline">Formspree</a> — free for 50 messages/month.
            </p>
        </form>
        
        <div class="mt-12 text-sm text-zinc-500">
            Prefer email? Reach us at <a href="mailto:akhilsgdrive@gmail.com" class="text-indigo-600 hover:underline">akhilsgdrive@gmail.com</a>
        </div>
    </div>

    <footer class="border-t border-zinc-200 dark:border-zinc-800 py-8 text-center text-sm text-zinc-500">
        Thank you for using Daily Utility Hub.
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
